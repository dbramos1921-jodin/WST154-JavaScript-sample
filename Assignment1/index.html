<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/styles.css">

</head>

<body>

    <main>
        <h1>My Story</h1>

        <form id="storyForm">
            <input type="text" id="personName" placeholder="Enter a name" required>
            <input type="text" id="place" placeholder="Enter a place" required>
            <input type="text" id="itemCount" placeholder="Enter a start number" required>
            <input type="text" id="item" placeholder="Enter an item">
            <input type="text" id="friendName" placeholder="Enter a friend's name" required>
            <input type="number" id="givenAway" placeholder="Enter a give away number" required>
            <input type="number" id="found" placeholder="Enter a foundnumber" required>
            <input type="submit" value="Generate Story">
        </form>


        <p id="story">
        </p>
    </main>
    <script src="js/script.js"></script>
</body>

</html>
